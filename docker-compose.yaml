version: '3.8'
services: 
  app:
    build: .
    ports:
    - "5000:5000"
    depends_on:
    - redis
    environment:
    - REDIS_HOST=redis
    networks:
    - app-network
  redis:
    image: "redis:7-alpine"
    networks:
    - app-network

networks:
  app-network:
    driver: bridge
